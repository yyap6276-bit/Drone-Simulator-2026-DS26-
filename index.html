<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drone Simulator 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin: 0; overflow: hidden; font-family: Arial; }

#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #111, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

h1 {
  font-size: 48px;
  letter-spacing: 2px;
  margin: 0;
}

#sub {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 5px;
  letter-spacing: 3px;
}

button {
  margin-top: 20px;
  padding: 12px 22px;
  font-size: 18px;
  cursor: pointer;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 8px;
  display: none;
  font-size: 13px;
}

canvas { display: block; }
</style>
</head>

<body>

<div id="menu">
  <h1>Drone Simulator 2026</h1>
  <div id="sub">DS26</div>
  <button id="playBtn">Start Simulation</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="ui">
WASD = Move<br>
Q/E = Up/Down<br>
Mouse = Steer
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let keys = {};
let gameStarted = false;

let yaw = 0;
let pitch = 0;

let velocity = new THREE.Vector3();
let targetVelocity = new THREE.Vector3();

init();

function init(){
  scene = new THREE.Scene();

  // realistic fog for depth 🌫️
  scene.fog = new THREE.Fog(0x0a0a0a, 20, 200);

  scene.background = new THREE.Color(0x0a0a0a);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0, 8, 20);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // soft lighting
  scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 0.8));

  // ground
  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400,400),
    new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:1 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // CITY (more realistic tones)
  for(let i=0;i<120;i++){
    let h = Math.random()*25 + 3;

    let colorShade = 0.15 + Math.random()*0.25;

    let b = new THREE.Mesh(
      new THREE.BoxGeometry(3, h, 3),
      new THREE.MeshStandardMaterial({
        color: new THREE.Color(colorShade, colorShade, colorShade),
        roughness: 0.9
      })
    );

    b.position.set(
      Math.random()*180 - 90,
      h/2,
      Math.random()*180 - 90
    );

    scene.add(b);
  }

  document.getElementById("playBtn").onclick = startGame;

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  document.addEventListener("mousemove", look);

  animate();
}

function startGame(){
  gameStarted = true;
  document.getElementById("menu").style.display = "none";
  document.getElementById("ui").style.display = "block";

  document.body.requestPointerLock();
}

function look(e){
  if(!gameStarted) return;
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.0022;
  pitch -= e.movementY * 0.0022;

  pitch = Math.max(-1.4, Math.min(1.4, pitch));
}

function updateCamera(){
  camera.rotation.set(pitch, yaw, 0);
}

function toggleFullscreen(){
  let el = document.documentElement;

  if(!document.fullscreenElement){
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function animate(){
  requestAnimationFrame(animate);

  if(gameStarted){

    // realistic inertia 🚁 (drone feel)
    let accel = 0.02;
    let maxSpeed = 0.8;
    let damping = 0.92;

    let forward = new THREE.Vector3(
      -Math.sin(yaw),
      0,
      -Math.cos(yaw)
    );

    let right = new THREE.Vector3(
      Math.cos(yaw),
      0,
      -Math.sin(yaw)
    );

    targetVelocity.set(0,0,0);

    if(keys["w"]) targetVelocity.add(forward);
    if(keys["s"]) targetVelocity.addScaledVector(forward, -1);
    if(keys["d"]) targetVelocity.add(right);
    if(keys["a"]) targetVelocity.addScaledVector(right, -1);

    targetVelocity.normalize().multiplyScalar(maxSpeed);

    velocity.lerp(targetVelocity, accel);

    camera.position.add(velocity);

    if(keys["q"]) camera.position.y += 0.4;
    if(keys["e"]) camera.position.y -= 0.4;

    velocity.multiplyScalar(damping);

    updateCamera();
  }

  renderer.render(scene, camera);
}

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
